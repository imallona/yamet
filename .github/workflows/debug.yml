name: check_unsupported_g++

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "method/src/**.cpp"
      - "method/CMakeLists.txt"
      - ".github/workflows/debug.yml"

jobs:
  unsupported_gpp_should_fail:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        compiler: [{ cpp: g++-12, c: gcc-12 }]
      fail-fast: false
    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: workflow/envs/yamet.yml
          activate-environment: yamet
          conda-config: channel_priority=strict

      - name: Build and test_0
        env:
          CC: ${{ matrix.compiler.c }}
          CXX: ${{ matrix.compiler.cpp }}
        run: |
          cd method
          bash build.sh

          cd ../test
          ../method/build/yamet \
              -c test_0/in/cell1.bed.gz \
              -r test_0/in/ref.bed.gz \
              -i test_0/in/regions.bed \
              --det-out current_test_0.out

          echo 'Diff expected vs produced'

          diff test_0/out/detailed.out \
              current_test_0.out || test $? -eq 0 || echo 'Failed as expected'

  supported_gpp_should_work:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        compiler: [{ cpp: g++-13, c: gcc-13 }]
      fail-fast: false
    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: workflow/envs/yamet.yml
          activate-environment: yamet
          conda-config: channel_priority=strict

      - name: Build and test_0
        env:
          CC: ${{ matrix.compiler.c }}
          CXX: ${{ matrix.compiler.cpp }}
        run: |
          cd method
          bash build.sh

          cd ../test
          ../method/build/yamet \
              -c test_0/in/cell1.bed.gz \
              -r test_0/in/ref.bed.gz \
              -i test_0/in/regions.bed \
              --det-out current_test_0.out

          echo 'Diff expected vs produced'

          diff test_0/out/detailed.out \
              current_test_0.out
