name: memleaks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "method/src/**.cpp"
      - "method/CMakeLists.txt"
      - ".github/workflows/memleaks.yml"

env:
  PREFIX: $HOME/build/

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v4

      - name: Installs
        run: |
          sudo apt update && sudo apt install -y libboost-iostreams-dev valgrind
          wget -q https://github.com/CLIUtils/CLI11/archive/refs/tags/v2.4.2.tar.gz -O /tmp/cli11.tar.gz
          tar -xzf /tmp/cli11.tar.gz -C /tmp
          cmake -S /tmp/CLI11-2.4.2 -B /tmp/cli11-build -DCLI11_TESTING=OFF -DCLI11_EXAMPLES=OFF
          sudo cmake --install /tmp/cli11-build

      - name: Build and valgrind
        run: |
          mkdir -p $PREFIX
          cd method
          ## export PREFIX=$PREFIX # ???
          bash build.sh
          ## ls -lR $PREFIX

          ## echo 'Permissions'
          ## cd $PREFIX/bin
          ## chmod +x yamet

          echo 'Pre valgrind call'

          export LD_LIBRARY_PATH=${LD_LIBRARY_PATH}:$(pwd)
          export PATH=$(pwd):$PREFIX/bin:$PATH

          echo 'Valgrind call'
          valgrind --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --verbose \
            ./build/yamet \
              -c $GITHUB_WORKSPACE/test/test_0/in/cell1.bed.gz \
              -r $GITHUB_WORKSPACE/test/test_0/in/ref.bed.gz \
              -i $GITHUB_WORKSPACE/test/test_0/in/regions.bed \
              --det-out valgrind_test_0.out
